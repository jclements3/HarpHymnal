<style>
  :root {
    --paper: #f3ecdc;
    --paper-dark: #e8dfc8;
    --ink: #1a1612;
    --ink-soft: #4a3f33;
    --rule: #c5b896;

    --accent-dark: #6a1f12;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'EB Garamond', 'Hoefler Text', Georgia, serif;
    font-size: 18px;
    line-height: 1.5;

  }

  body {
    background-image:

    padding: 2rem 1rem 4rem;

  .frame {
    max-width: 1080px;
    margin: 0 auto;
  }

  /* Top masthead */
  header.masthead {
    border-top: 4px double var(--ink);
    border-bottom: 1px solid var(--ink);
    padding: 1.5rem 0 1rem;
    margin-bottom: 1rem;
    text-align: center;
  }
  header.masthead h1 {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(2rem, 5vw, 3.4rem);
    letter-spacing: 0.01em;
    line-height: 1;
    margin-bottom: 0.4rem;

  header.masthead .sub {
    font-family: 'JuliaMono', ui-monospace, monospace;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);

  header.masthead .sub::before,
  header.masthead .sub::after {
    content: ' · ';
    color: var(--accent);
  }

  /* Key picker */
  .picker {
    margin: 1.5rem 0 2rem;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);

  .picker-label {
    font-family: 'JuliaMono', monospace;
    font-size: 0.72rem;

    display: grid;
    grid-template-columns: repeat(15, 1fr);
    gap: 4px;
    max-width: 100%;

  @media (max-width: 900px) {

    color: var(--paper);

    border-color: var(--accent-dark);

  footer {

    font-family: 'JuliaMono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    border-top: 1px solid var(--rule);
    padding-top: 1.2rem;
  }
  footer .ornament {
    color: var(--accent);
    margin: 0 0.5rem;

<body>

<div class="frame">

  <header class="masthead">
    <h1>Diatonic Harp Drills</h1>
    <div class="sub">Chord voicings · scale-degree notation · lever &amp; pedal harp</div>
  </header>

  <div class="picker">
    <div class="picker-label">Set the levers <span class="mark">→</span> Pick a key</div>
    <div class="keys" id="keys"></div>
  </div>

  <div class="settings">
    <span>Harp</span>
    <div class="harp-toggle" id="harp-toggle">
      <button data-harp="lever" class="active">
        Lever 30
        <span class="range-detail">C2 – D6</span>
      </button>
      <button data-harp="pedal">
        Pedal 47
        <span class="range-detail">C1 – G7</span>
      </button>
    </div>
  </div>

  <div id="scale-card-wrap"></div>

  <pre class="drills" id="output"></pre>

  <footer>
    a tool for harpists <span class="ornament">❦</span> stack chords up the strings <span class="ornament">❦</span> repeat to the top
  </footer>

</div>

<script>
// =============================================================================
// MUSIC THEORY DATA
// =============================================================================
const KEYS = [
  // Order them around the circle of fifths so the picker has a natural feel
  ['Cb', 'C', 'b'], ['Gb', 'G', 'b'], ['Db', 'D', 'b'], ['Ab', 'A', 'b'],
  ['Eb', 'E', 'b'], ['Bb', 'B', 'b'], ['F',  'F', ''],  ['C',  'C', ''],
  ['G',  'G', ''],  ['D',  'D', ''],  ['A',  'A', ''],  ['E',  'E', ''],
  ['B',  'B', ''],  ['F#', 'F', '#'], ['C#', 'C', '#'],
];

const LETTERS = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
const NATURAL_PC = {C:0, D:2, E:4, F:5, G:7, A:9, B:11};
const MAJOR_STEPS = [0, 2, 4, 5, 7, 9, 11];

function buildScale(tonicLetter, tonicAcc) {
  const tonicIdx = LETTERS.indexOf(tonicLetter);
  const tonicPc = ((NATURAL_PC[tonicLetter] +
                    (tonicAcc === '#' ? 1 : tonicAcc === 'b' ? -1 : 0)) % 12 + 12) % 12;
  const scale = [];
  for (let i = 0; i < 7; i++) {
    const letter = LETTERS[(tonicIdx + i) % 7];
    const targetPc = (tonicPc + MAJOR_STEPS[i]) % 12;
    const naturalPc = NATURAL_PC[letter];
    let diff = ((targetPc - naturalPc) % 12 + 12) % 12;
    if (diff > 6) diff -= 12;
    let acc;
    if (diff === 0) acc = '';
    else if (diff === 1) acc = '#';
    else if (diff === -1) acc = 'b';
    else if (diff === 2) acc = 'x';
    else if (diff === -2) acc = 'bb';
    else acc = '?' + diff;
    scale.push([letter, acc]);
  }
  return scale;
}

function buildStrings(scale, bassLetter, bassOctave, numStrings) {
  const letterToDegree = {};
  scale.forEach(([l, a], i) => { letterToDegree[l] = [i + 1, a]; });
  const bassIdx = LETTERS.indexOf(bassLetter);
  const out = [];
  for (let i = 0; i < numStrings; i++) {
    const letter = LETTERS[(bassIdx + i) % 7];
    let crossings = 0;
    for (let step = 0; step < i; step++) {
      const nextPos = (bassIdx + step + 1) % 7;
      if (nextPos === 0) crossings++;
    }
    const octave = bassOctave + crossings;
    const [degree, acc] = letterToDegree[letter];
    out.push({letter, accidental: acc, degree, octave, idx: i});
  }
  return out;
}

function renderVoicing(stack, strings) {
  const placements = [];
  let bassIdx = null;
  for (const s of strings) {
    if (s.degree === stack[0]) { bassIdx = s.idx; break; }
  }
  if (bassIdx === null) return null;
  placements.push(bassIdx);
  let stackPos = 1;
  while (true) {
    const targetDeg = stack[stackPos % stack.length];
    const prev = placements[placements.length - 1];
    let nextIdx = null;
    for (const s of strings) {
      if (s.idx > prev && s.degree === targetDeg) { nextIdx = s.idx; break; }
    }
    if (nextIdx === null) break;
    placements.push(nextIdx);
    stackPos++;
  }
  const set = new Set(placements);
  let out = '';
  for (const s of strings) {
    out += set.has(s.idx) ? s.letter : '.';
  }
  return out;
}

const ACC_MAP = {'': '', '#': '\u266F', 'b': '\u266D', 'bb': '\uD834\uDD2B', 'x': '\uD834\uDD2A'};
function fmtNote(letter, acc) { return letter + (ACC_MAP[acc] !== undefined ? ACC_MAP[acc] : acc); }
function degreeToNote(d, scale) { const [l, a] = scale[d - 1]; return fmtNote(l, a); }

function combineAccidentals(scaleAcc, symbolAcc) {
  const offsets = {'': 0, '#': 1, 'b': -1, 'x': 2, 'bb': -2, '\u266F': 1, '\u266D': -1};
  const total = (offsets[scaleAcc] || 0) + (offsets[symbolAcc] || 0);
  if (total === 0) return '';
  if (total === 1) return '#';
  if (total === -1) return 'b';
  if (total === 2) return 'x';
  if (total === -2) return 'bb';
  return '?' + total;
}

function chordNameForSymbol(symbol, scale) {
  const slashIdx = symbol.indexOf('/');
  let mainPart, bassPart;
  if (slashIdx >= 0) {
    mainPart = symbol.slice(0, slashIdx);
    bassPart = symbol.slice(slashIdx + 1);
  } else {
    mainPart = symbol; bassPart = null;
  }
  // Match: optional flat/sharp, digit, caret (U+0302), then quality
  const re = /^([\u266D\u266F])?(\d)\u0302(.*)$/;
  const m = mainPart.match(re);
  if (!m) return symbol;
  const rootAcc = m[1] || '';
  const rootDeg = parseInt(m[2], 10);
  const quality = m[3];
  const [letter, scaleAcc] = scale[rootDeg - 1];
  let chordAcc = scaleAcc;
  if (rootAcc) chordAcc = combineAccidentals(scaleAcc, rootAcc);
  let chordName = fmtNote(letter, chordAcc) + quality;
  if (bassPart !== null) {
    const bm = bassPart.match(re);
    if (bm) {
      const bAccSym = bm[1] || '';
      const bDeg = parseInt(bm[2], 10);
      const bExtra = bm[3];
      const [bLetter, bScaleAcc] = scale[bDeg - 1];
      let bAcc = bScaleAcc;
      if (bAccSym) bAcc = combineAccidentals(bScaleAcc, bAccSym);
      chordName += '/' + fmtNote(bLetter, bAcc) + bExtra;
    } else {
      chordName += '/' + bassPart;
    }
  }
  return chordName;
}

// Approximate display width — combining marks count as zero
function visualWidth(s) {
  let w = 0;
  for (const ch of s) {
    const cp = ch.codePointAt(0);
    if (cp >= 0x0300 && cp <= 0x036F) continue;
    w++;
  }
  return w;
}
function padVisual(s, width) {
  const vw = visualWidth(s);
  return vw < width ? s + ' '.repeat(width - vw) : s;
}

function formatComment(template, scale) {
  let out = template;
  for (let d = 1; d <= 7; d++) {
    out = out.split('{' + d + '}').join(degreeToNote(d, scale));
  }
  return out;
}

// =============================================================================
// CHORD CATALOG (auto-generated from generate_drills.py)
// =============================================================================
const SECTIONS = [

    [[3, 5, 7], "3\u0302m", "mediant minor, tonic substitute ({3} {5} {7})"],
    [[4, 6, 1], "4\u0302", "subdominant ({4} {6} {1})"],
    [[5, 7, 2], "5\u0302", "dominant ({5} {7} {2})"],
    [[6, 1, 3], "6\u0302m", "submediant minor, relative minor ({6} {1} {3})"],
    [[7, 2, 4], "7\u0302\u00b0", "leading-tone diminished ({7} {2} {4})"],
  ]],

    [[4, 6, 2], "2\u0302m/4\u0302", "supertonic minor, 3rd in bass"],
    [[5, 7, 3], "3\u0302m/5\u0302", "mediant minor, 3rd in bass"],
    [[6, 1, 4], "4\u0302/6\u0302", "subdominant, 3rd in bass"],
    [[7, 2, 5], "5\u0302/7\u0302", "dominant in first inversion (smooth approach to 1\u0302)"],
    [[1, 3, 6], "6\u0302m/1\u0302", "submediant minor, 3rd in bass"],

// =============================================================================
// RENDER
// =============================================================================
function escapeHTML(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function colorizeLayout(layoutStr) {
  // Each char is either a letter or '.'. Wrap accordingly.
  let out = '';
  for (const ch of layoutStr) {
    if (ch === '.') out += '<span class="unplayed">.</span>';
    else out += '<span class="played">' + escapeHTML(ch) + '</span>';
  }
  return out;
}

function generateOutput(keyName, numStrings, bassLetter, bassOctave) {
  const keyEntry = KEYS.find(k => k[0] === keyName);
  if (!keyEntry) return {scale: null, html: '<em>Unknown key</em>'};
  const [, tonicLetter, tonicAcc] = keyEntry;
  const scale = buildScale(tonicLetter, tonicAcc);
  const strings = buildStrings(scale, bassLetter, bassOctave, numStrings);

  const headerStrings = strings.map(s => s.letter).join('');
  const headerDegrees = strings.map(s => s.degree).join('');

  // First pass — gather all rows and find column widths
  const allRows = [];
  let maxSym = 0, maxChord = 0;
  for (const [title, items] of SECTIONS) {
    const sectionRows = [];
    for (const [stack, symbol, commentTemplate] of items) {
      const row = renderVoicing(stack, strings);
      if (row === null || row.length !== numStrings) continue;
      const comment = formatComment(commentTemplate, scale);
      const chordName = chordNameForSymbol(symbol, scale);
      sectionRows.push({row, symbol, chordName, comment});
      maxSym = Math.max(maxSym, visualWidth(symbol));
      maxChord = Math.max(maxChord, visualWidth(chordName));
    }
    allRows.push({title, rows: sectionRows});
  }

  // Build HTML for the pre block
  let html = '';
  html += '<span class="header-strings">' + escapeHTML(headerStrings) + '</span>';
  html += '  <span class="comment">String layout (low \u2192 high, lowest is ' +
          bassLetter + bassOctave + ')</span>\n';
  html += '<span class="header-degrees">' + escapeHTML(headerDegrees) + '</span>';
  html += '  <span class="comment">Scale degrees</span>\n\n';

  for (const {title, rows} of allRows) {
    html += '\n<span class="section-title">-- ' + escapeHTML(title) + ' --</span>\n';
    for (const {row, symbol, chordName, comment} of rows) {
      const symPad = padVisual(symbol, maxSym);
      const chordPad = padVisual(chordName, maxChord);
      // Replace trailing spaces with literal spaces preserved by white-space:pre
      html += colorizeLayout(row);
      html += '  <span class="symbol">' + escapeHTML(symPad) + '</span>';
      html += '  <span class="chord-name">' + escapeHTML(chordPad) + '</span>';
      html += '  <span class="comment">' + escapeHTML(comment) + '</span>\n';
    }
  }

  return {scale, scaleDisplay: scale.map(([l,a]) => fmtNote(l, a)), html};
}

function renderScaleCard(keyName, scaleDisplay, numStrings, bassDisplay, harpLabel) {
  const keyEntry = KEYS.find(k => k[0] === keyName);
  const [_, tonicLetter, tonicAcc] = keyEntry;
  const keyDisplay = fmtNote(tonicLetter, tonicAcc);
  let html = '<div class="scale-card">';
  html += '<h2>' + escapeHTML(keyDisplay) + ' major</h2>';
  html += '<div class="scale-display">';
  for (const n of scaleDisplay) {
    html += '<span class="note">' + escapeHTML(n) + '</span>';
  }
  html += '</div>';
  html += '<div class="meta">' + escapeHTML(harpLabel) + ' &middot; ' +
          numStrings + ' strings &middot; lowest is ' +
          escapeHTML(bassDisplay) + ' &middot; tune levers/pedals to match</div>';
  html += '</div>';
  return html;
}

// =============================================================================
// UI
// =============================================================================
function buildKeyButtons() {
  const wrap = document.getElementById('keys');
  wrap.innerHTML = '';
  for (const [keyName, letter, acc] of KEYS) {
    const btn = document.createElement('button');
    btn.className = 'key-btn';
    btn.dataset.key = keyName;
    btn.innerHTML = escapeHTML(fmtNote(letter, acc));
    btn.addEventListener('click', () => selectKey(keyName));
    wrap.appendChild(btn);
  }
}

let currentKey = 'C';
let currentHarp = 'lever';

const HARP_PRESETS = {
  lever: {numStrings: 30, bassLetter: 'C', bassOctave: 2, label: '30-string lever harp'},
  pedal: {numStrings: 47, bassLetter: 'C', bassOctave: 1, label: '47-string pedal harp'},
};

function selectKey(keyName) {
  currentKey = keyName;
  document.querySelectorAll('.key-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.key === keyName);
  });
  rerender();
}

function selectHarp(harpType) {
  currentHarp = harpType;
  document.querySelectorAll('.harp-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.harp === harpType);
  });
  rerender();
}

function rerender() {
  const preset = HARP_PRESETS[currentHarp];
  const result = generateOutput(currentKey, preset.numStrings, preset.bassLetter, preset.bassOctave);
  if (result.scale) {
    document.getElementById('scale-card-wrap').innerHTML =
      renderScaleCard(currentKey, result.scaleDisplay, preset.numStrings,
                      preset.bassLetter + preset.bassOctave, preset.label);
  }
  const out = document.getElementById('output');
  out.innerHTML = result.html;
  // Use smaller font size when displaying the wide 47-string layout
  out.classList.toggle('wide', currentHarp === 'pedal');
}

document.addEventListener('DOMContentLoaded', () => {
  buildKeyButtons();
  document.querySelectorAll('.harp-toggle button').forEach(btn => {
    btn.addEventListener('click', () => selectHarp(btn.dataset.harp));
  });
  selectKey('C');
});
</script>
