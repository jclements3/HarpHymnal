<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>HarpHymnal Drills</title>
<style>
  :root {
    --bg:        #f7f3ea;
    --ink:       #2a2a2a;
    --muted:     #888;
    --line:      #d8d0c0;
    --panel:     #ffffff;
    --panel-alt: #f0ece0;
    --lhcol:     #7B2B2B;
    --rhcol:     #1F4E79;
    --sub:       #C0605A;
    --app:       #4080A0;
    --voi:       #50A050;
    --pla:       #7B4A9E;
    --pool:      #8B5A2B;
    --tap:       rgba(37, 99, 235, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; width: 100%;
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  button {
    font-family: inherit; font-size: 18px;
    border: 2px solid var(--line); border-radius: 10px;
    background: var(--panel); color: var(--ink);
    padding: 12px 20px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 48px; min-width: 48px;
  }
  button:active { background: var(--tap); }
  button:disabled { opacity: 0.4; cursor: default; }

  #app {
    display: flex; flex-direction: column;
    width: 100%; height: 100%;
  }

  /* ──────── Home screen ──────── */
  #home {
    display: flex; flex-direction: column; height: 100%;
    padding: 20px;
  }
  #home-title {
    font-size: 28px; font-weight: bold;
    padding-bottom: 14px; margin-bottom: 14px;
    border-bottom: 2px solid var(--line);
    color: var(--ink);
  }
  #home-title small {
    font-size: 15px; font-weight: normal; color: var(--muted);
    margin-left: 12px;
  }
  #tile-grid {
    flex: 1; overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px; padding: 4px; align-content: start;
    -webkit-overflow-scrolling: touch;
  }
  .tile {
    padding: 20px 18px;
    border-radius: 12px;
    background: var(--panel);
    border: 2px solid var(--line);
    cursor: pointer;
    min-height: 120px;
    display: flex; flex-direction: column; justify-content: space-between;
    -webkit-tap-highlight-color: transparent;
  }
  .tile:active { background: var(--tap); }
  .tile.empty { opacity: 0.4; cursor: default; }
  .tile-name {
    font-size: 22px; font-weight: bold; line-height: 1.2;
    margin-bottom: 8px;
  }
  .tile-rule {
    font-size: 13px; color: var(--muted);
    font-style: italic; line-height: 1.3;
  }
  .tile-meta {
    font-size: 13px; color: var(--muted); margin-top: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .tile-count {
    font-size: 13px; font-weight: bold;
    padding: 3px 10px; border-radius: 12px;
    background: var(--panel-alt); color: var(--ink);
  }
  .tile-banner {
    height: 6px; border-radius: 3px 3px 0 0;
    margin: -20px -18px 16px -18px;
  }
  .tile.pool .tile-banner { background: var(--pool); }
  .tile.substitution .tile-banner { background: var(--sub); }
  .tile.approach     .tile-banner { background: var(--app); }
  .tile.voicing      .tile-banner { background: var(--voi); }
  .tile.placement    .tile-banner { background: var(--pla); }
  .tile.retab        .tile-banner { background: #C0322A; }
  .tile.retab { border-color: #C0322A; }
  .tile.retabhymnal  .tile-banner { background: #7B2121; }
  .tile.retabhymnal { border-color: #7B2121; }
  .tile.reharmhymnal .tile-banner { background: #8B6914; }
  .tile.reharmhymnal { border-color: #8B6914; }
  .tile.reharm       .tile-banner { background: #C9A227; }
  .tile.reharm { border-color: #C9A227; }
  .tile.docs         .tile-banner { background: #1F4E79; }
  .tile.docs { border-color: #1F4E79; }
  .tile.shapes       .tile-banner { background: #4A2545; }
  .tile.shapes { border-color: #4A2545; }
  .tile.chopinhymnal .tile-banner { background: #3A1B36; }
  .tile.chopinhymnal { border-color: #3A1B36; }
  .tile.boddiehymnal .tile-banner { background: #1F3A5F; }
  .tile.boddiehymnal { border-color: #1F3A5F; }
  .tile.boddiedrills  .tile-banner { background: #4178A8; }
  .tile.boddiedrills  { border-color: #4178A8; }
  .tile.boddiesource .tile-banner { background: #6F4A8A; }
  .tile.boddiesource { border-color: #6F4A8A; }
  .tile.ebshapes    .tile-banner { background: #2C7C5A; }
  .tile.ebshapes    { border-color: #2C7C5A; }
  .tile.shapedrills .tile-banner { background: #8B2A1A; }
  .tile.shapedrills { border-color: #8B2A1A; }
  .tile.composer    .tile-banner { background: #6B46C1; }
  .tile.composer    { border-color: #6B46C1; }

  /* ──────── Retab screen (reuses drill-section visuals) ──────── */
  #retab { display: none; flex-direction: column; height: 100%; }
  #retab.active { display: flex; }
  #retab-banner {
    padding: 12px 20px;
    color: #fff;
    display: flex; align-items: center; gap: 14px;
    flex-shrink: 0;
    background: #C0322A;
  }
  #retab-title { font-size: 22px; font-weight: bold; flex: 1; }
  #retab-sub   { font-size: 13px; font-style: italic; opacity: 0.92; }
  #retab-meta  {
    font-size: 13px; opacity: 0.95;
    padding: 4px 10px; border-radius: 12px;
    background: rgba(255,255,255,0.18); margin-right: 8px;
  }
  #retab-counter {
    font-size: 18px; font-weight: bold;
    padding: 6px 14px; border-radius: 18px;
    background: rgba(255,255,255,0.25); color: #fff;
    min-width: 90px; text-align: center;
  }
  #retab-home-btn {
    background: rgba(255,255,255,0.25); color: #fff;
    border-color: rgba(255,255,255,0.5);
    font-size: 16px; padding: 8px 14px; font-weight: bold;
  }
  #retab-home-btn:active { background: rgba(255,255,255,0.45); }
  #retab-card-area {
    flex: 1;
    padding: 8px;
    overflow: auto;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center;
  }
  #retab-card {
    background: var(--panel);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 10px; width: 100%; max-width: 1100px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }
  #retab-card svg { max-width: 100%; height: auto; display: block; margin: 0 auto; }
  #retab-card .retab-hint {
    font-size: 15px; color: var(--muted); margin-top: 10px; text-align: center;
  }
  #retab-controls {
    padding: 10px; display: flex; gap: 10px;
    border-top: 1px solid var(--line); background: var(--panel);
    flex-shrink: 0;
  }
  #retab-controls button { flex: 1; }

  #retabhymnal-levels {
    display: inline-flex; gap: 2px; align-items: center;

  #retabhymnal-levels button {
    background: rgba(255,255,255,0.10); color: #fff;
    border: 1px solid rgba(255,255,255,0.5); border-radius: 6px;
    font-size: 13px; padding: 4px 10px; font-weight: bold;

  #retabhymnal-levels button:active { background: rgba(255,255,255,0.45); }
  #retabhymnal-levels button.active { background: rgba(255,255,255,0.45); }
  #retabhymnal-search-bar {
    padding: 6px 10px; background: #4a1313;
    border-bottom: 1px solid #2a0a0a;

  }
  #retabhymnal-search {
    flex: 1; font-size: 15px; padding: 6px 10px;
    border: 1px solid #2a0a0a; border-radius: 6px;
    background: #fff; color: #2a0a0a;
  }
  #retabhymnal-count { color: #e8c4c4; font-size: 13px; min-width: 66px; text-align: right; }
  #retabhymnal-split { flex: 1; display: flex; min-height: 0; }
  #retabhymnal-index {
    width: 300px; min-width: 220px; background: #2a0a0a; color: #f4ecd8;
    overflow-y: auto; border-right: 1px solid #000; flex-shrink: 0;
  }
  .retabhymnal-letter-group { border-bottom: 1px solid #5a1e1e; }
  .retabhymnal-letter-header {
    padding: 10px 16px; font-size: 18px; font-weight: 700;
    cursor: pointer; background: #4a1313; color: #f4ecd8;
    display: flex; justify-content: space-between; align-items: center;
    user-select: none;
  }
  .retabhymnal-letter-header:hover { background: #5e1a1a; }
  .retabhymnal-letter-header .retabhymnal-letter-count {
    font-size: 13px; font-weight: 400; color: #e8c4c4;
  }
  .retabhymnal-letter-header::before {
    content: '▸'; display: inline-block; width: 16px; margin-right: 6px;
    transition: transform 0.1s ease;
  }
  .retabhymnal-letter-group.open .retabhymnal-letter-header::before { transform: rotate(90deg); }
  .retabhymnal-letter-items { display: none; background: #1a0404; }
  .retabhymnal-letter-group.open .retabhymnal-letter-items { display: block; }
  .retabhymnal-item {
    padding: 9px 16px 9px 38px; cursor: pointer; font-size: 15px;
    color: #e8dcc0; border-bottom: 1px solid #2a0a0a; line-height: 1.3;
  }
  .retabhymnal-item:hover { background: #3c0f0f; }
  .retabhymnal-item.selected { background: #7B2121; color: #fff; font-weight: 600; }
  .retabhymnal-item-num { color: #c9a87a; font-size: 12px; margin-right: 6px; font-variant-numeric: tabular-nums; }
  .retabhymnal-item.selected .retabhymnal-item-num { color: #ffd6d6; }
  .retabhymnal-item-meta { font-size: 11px; color: #9b6a5f; }
  .retabhymnal-item.selected .retabhymnal-item-meta { color: #f4c8c8; }
  #retabhymnal-pane {
    flex: 1; overflow: auto; background: var(--bg);
    padding: 8px;
    display: flex; flex-direction: column; align-items: center;
    min-width: 0;
  }
  #retabhymnal-card {
    background: var(--panel);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 10px; width: 100%; max-width: 1100px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }
  #retabhymnal-card svg { max-width: 100%; height: auto; display: block; margin: 0 auto; }
  #retabhymnal-card .empty-note { padding: 40px; color: var(--muted); text-align: center; }
  #retabhymnal-controls {
    padding: 10px; display: flex; gap: 10px;
    border-top: 1px solid var(--line); background: var(--panel);
    flex-shrink: 0;
  }
  #retabhymnal-controls button { flex: 1; }

  .pool-notes .rh { color: var(--rhcol); }

  .chapter-cell {

    white-space: nowrap;

  .tech-frac-from .rh, .tech-frac-to .rh { color: var(--rhcol); }
  /* Transition cell — colored splash that sits at the start of each deck. */
  .trans-cell {
    display: flex; flex-direction: column; align-items: center; justify-content: center;

    border-radius: 14px;
    color: #fff; text-align: center;

  .trans-pool         { background: #8B6F47; }

  #card.swipe-right { animation: swR 0.14s ease-out; }

  @keyframes swR { 0% { transform: translateX(0); } 100% { transform: translateX(16px); } }

  const $ = (id) => document.getElementById(id);

  function splitLHRH(notes) {
    // lowercase = LH, uppercase = RH. Interleave runs so we can color them.
    const out = [];
    let run = '';
    let isLower = null;
    for (const ch of notes) {
      const lower = ch === ch.toLowerCase();
      if (isLower === null) { run = ch; isLower = lower; continue; }
      if (lower === isLower) { run += ch; continue; }
      out.push({ text: run, lh: isLower });
      run = ch; isLower = lower;
    }
    if (run) out.push({ text: run, lh: isLower });
    return out;
  }

  function renderNotes(notes) {
    // Returns HTML with .lh / .rh spans.
    return splitLHRH(notes).map(r =>
      `<span class="${r.lh ? 'lh' : 'rh'}">${r.text}</span>`
    ).join('');
  }

  function exitRetabHymnal() {

    $('home').style.display = 'flex';

  function renderRetabHymnalIndex(query) {
    const idx = $('retabhymnal-index');
    idx.innerHTML = '';
    const q = (query || '').trim().toLowerCase();
    const all = window.RETAB_HYMNS || [];
    const matches = q
      ? all.filter(h => h.title.toLowerCase().includes(q)
                     || (h.num || '').includes(q)
                     || (h.slug || '').toLowerCase().includes(q))
      : all;
    $('retabhymnal-count').textContent = matches.length + ' / ' + all.length;

    // Group alphabetically by title's first letter (stripping leading quotes).
    const groups = {};
    for (const h of matches) {
      const t = (h.title || '').replace(/^['"]+/, '');
      const letter = /[A-Z]/i.test(t[0]) ? t[0].toUpperCase() : '#';
      (groups[letter] = groups[letter] || []).push(h);
    }
    const letters = Object.keys(groups).sort((a, b) => {
      if (a === '#') return 1;
      if (b === '#') return -1;
      return a.localeCompare(b);
    });

    for (const letter of letters) {
      const hymns = groups[letter];
      const group = document.createElement('div');
      group.className = 'retabhymnal-letter-group';
      group.dataset.letter = letter;
      if (q) group.classList.add('open');

      const header = document.createElement('div');
      header.className = 'retabhymnal-letter-header';
      header.innerHTML =
        '<span>' + escapeHtml(letter) + '</span>' +
        '<span class="retabhymnal-letter-count">' + hymns.length + '</span>';
      header.addEventListener('click', () => group.classList.toggle('open'));
      group.appendChild(header);

      const items = document.createElement('div');
      items.className = 'retabhymnal-letter-items';
      for (const h of hymns) {
        const item = document.createElement('div');
        item.className = 'retabhymnal-item';
        const realIdx = (window.RETAB_HYMNS || []).indexOf(h);
        if (realIdx === retabHymnalIdx) item.classList.add('selected');
        const meta = [h.key, h.meter].filter(Boolean).join(' · ');
        const numSpan = h.num ? '<span class="retabhymnal-item-num">' + escapeHtml(h.num) + '</span>' : '';
        item.innerHTML =
          numSpan + escapeHtml(h.title) +
          (meta ? '<div class="retabhymnal-item-meta">' + escapeHtml(meta) + '</div>' : '');
        item.addEventListener('click', () => {
          retabHymnalIdx = realIdx;
          renderRetabHymnalIndex($('retabhymnal-search').value);
          showRetabHymnalCard();
        });
        items.appendChild(item);
      }
      group.appendChild(items);
      idx.appendChild(group);
    }

    if (!matches.length) {
      idx.innerHTML = '<div class="empty-note" style="color:#c9a87a; padding:20px">No hymns match.</div>';
    }
  }

  function showRetabHymnalCard() {
    const hymns = window.RETAB_HYMNS || [];
    const n = hymns.length;
    if (!n) return;
    if (retabHymnalIdx < 0) retabHymnalIdx = 0;
    if (retabHymnalIdx >= n) retabHymnalIdx = n - 1;
    const h = hymns[retabHymnalIdx];

    const prefix = h.num ? h.num + '. ' : '';
    $('retabhymnal-title').textContent = prefix + h.title;
    $('retabhymnal-sub').textContent = [h.key, h.meter].filter(Boolean).join(' · ');
    $('retabhymnal-meta').textContent = h.bars + ' bars';
    $('retabhymnal-counter').textContent = (retabHymnalIdx + 1) + ' / ' + n;

    // Expand the current hymn's letter group and mark it selected.
    const firstLetter = (h.title || '').replace(/^['"]+/, '')[0] || '';
    const letter = /[A-Z]/i.test(firstLetter) ? firstLetter.toUpperCase() : '#';
    const group = document.querySelector(
      '.retabhymnal-letter-group[data-letter="' + letter + '"]');
    if (group) group.classList.add('open');
    // Refresh selection highlight without rebuilding the whole tree.
    document.querySelectorAll('.retabhymnal-item.selected')
      .forEach(el => el.classList.remove('selected'));
    const items = document.querySelectorAll('.retabhymnal-item');
    // Item index within the filtered set may not equal retabHymnalIdx; find
    // the matching text instead (cheap for N≈279).
    for (const el of items) {
      if (el.textContent.startsWith(h.num || '') && el.textContent.includes(h.title)) {
        el.classList.add('selected');
        el.scrollIntoView({ block: 'nearest' });
        break;
      }
    }

    const card = $('retabhymnal-card');
    card.innerHTML = '';
    const img = document.createElement('img');
    // Resolve SVG path: prefer h.svgs[currentLevel], fall back to L3 or
    // first available key, finally fall back to legacy h.svg.
    let svgPath = null;
    if (h.svgs && typeof h.svgs === 'object') {
      const lvlKey = String(retabHymnalLevel);
      if (h.svgs[lvlKey]) {
        svgPath = h.svgs[lvlKey];
      } else if (h.svgs['3']) {
        svgPath = h.svgs['3'];
      } else {
        const firstKey = Object.keys(h.svgs)[0];
        if (firstKey) svgPath = h.svgs[firstKey];
      }
    }
    if (!svgPath) svgPath = h.svg;
    img.src = svgPath;
    img.alt = h.title;
    img.style.width = '100%';
    img.style.height = 'auto';
    img.style.display = 'block';
    img.style.margin = '0 auto';
    img.onerror = () => {
      card.innerHTML = '<div class="empty-note">Could not load ' + svgPath + '</div>';
    };
    card.appendChild(img);
  }

  function renderBoddieHymnalIndex(query) {
    const idx = $('boddiehymnal-index');
    idx.innerHTML = '';
    const q = (query || '').trim().toLowerCase();
    const all = window.BODDIE_HYMNS || [];
    const matches = q
      ? all.filter(h => h.title.toLowerCase().includes(q)
                     || (h.num || '').includes(q)
                     || (h.slug || '').toLowerCase().includes(q))
      : all;
    $('boddiehymnal-count').textContent = matches.length + ' / ' + all.length;

    const groups = {};
    for (const h of matches) {
      const t = (h.title || '').replace(/^['"]+/, '');
      const letter = /[A-Z]/i.test(t[0]) ? t[0].toUpperCase() : '#';
      (groups[letter] = groups[letter] || []).push(h);
    }
    const letters = Object.keys(groups).sort((a, b) => {
      if (a === '#') return 1;
      if (b === '#') return -1;
      return a.localeCompare(b);
    });

    for (const letter of letters) {
      const hymns = groups[letter];
      const group = document.createElement('div');
      group.className = 'boddiehymnal-letter-group';
      group.dataset.letter = letter;
      if (q) group.classList.add('open');

      const header = document.createElement('div');
      header.className = 'boddiehymnal-letter-header';
      header.innerHTML =
        '<span>' + escapeHtml(letter) + '</span>' +
        '<span class="boddiehymnal-letter-count">' + hymns.length + '</span>';
      header.addEventListener('click', () => group.classList.toggle('open'));
      group.appendChild(header);

      const items = document.createElement('div');
      items.className = 'boddiehymnal-letter-items';
      for (const h of hymns) {
        const item = document.createElement('div');
        item.className = 'boddiehymnal-item';
        const realIdx = (window.BODDIE_HYMNS || []).indexOf(h);
        if (realIdx === boddieHymnalIdx) item.classList.add('selected');
        const meta = [h.key, h.meter].filter(Boolean).join(' · ');
        const numSpan = h.num ? '<span class="boddiehymnal-item-num">' + escapeHtml(h.num) + '</span>' : '';
        item.innerHTML =
          numSpan + escapeHtml(h.title) +
          (meta ? '<div class="boddiehymnal-item-meta">' + escapeHtml(meta) + '</div>' : '');
        item.addEventListener('click', () => {
          boddieHymnalIdx = realIdx;
          renderBoddieHymnalIndex($('boddiehymnal-search').value);
          showBoddieHymnalCard();
        });
        items.appendChild(item);
      }
      group.appendChild(items);
      idx.appendChild(group);
    }

    if (!matches.length) {
      idx.innerHTML = '<div class="empty-note" style="color:#a0b4d8; padding:20px">No hymns match.</div>';
    }
  }

  function showBoddieHymnalCard() {
    const hymns = window.BODDIE_HYMNS || [];
    const n = hymns.length;
    if (!n) return;
    if (boddieHymnalIdx < 0) boddieHymnalIdx = 0;
    if (boddieHymnalIdx >= n) boddieHymnalIdx = n - 1;
    const h = hymns[boddieHymnalIdx];

    const prefix = h.num ? h.num + '. ' : '';
    $('boddiehymnal-title').textContent = prefix + h.title;
    $('boddiehymnal-sub').textContent = [h.key, h.meter].filter(Boolean).join(' · ');
    $('boddiehymnal-meta').textContent = h.bars + ' bars';
    $('boddiehymnal-counter').textContent = (boddieHymnalIdx + 1) + ' / ' + n;

    const firstLetter = (h.title || '').replace(/^['"]+/, '')[0] || '';
    const letter = /[A-Z]/i.test(firstLetter) ? firstLetter.toUpperCase() : '#';
    const group = document.querySelector(
      '.boddiehymnal-letter-group[data-letter="' + letter + '"]');
    if (group) group.classList.add('open');
    document.querySelectorAll('.boddiehymnal-item.selected')
      .forEach(el => el.classList.remove('selected'));
    const items = document.querySelectorAll('.boddiehymnal-item');
    for (const el of items) {
      if (el.textContent.startsWith(h.num || '') && el.textContent.includes(h.title)) {
        el.classList.add('selected');
        el.scrollIntoView({ block: 'nearest' });
        break;
      }
    }

    const card = $('boddiehymnal-card');
    card.innerHTML = '';
    const svgPath = h.svg;
    const img = document.createElement('img');
    img.src = svgPath;
    img.alt = h.title;
    img.style.width = '100%';
    img.style.height = 'auto';
    img.style.display = 'block';
    img.style.margin = '0 auto';
    img.onerror = () => {

  function makeTile(spec) {
    const tile = document.createElement('div');
    tile.className = 'tile ' + spec.family;
    tile.innerHTML = [
      '<div class="tile-banner"></div>',
      '<div>',
      '  <div class="tile-name">' + escapeHtml(spec.name) + '</div>',
      '  <div class="tile-rule">' + escapeHtml(spec.rule || '') + '</div>',
      '</div>',
      '<div class="tile-meta">',
      '  <span>' + (spec.family === 'pool' ? 'pool' : spec.family) + '</span>',
      '  <span class="tile-count">' + spec.count + '</span>',
      '</div>',
    ].join('');
    if (spec.onTap) tile.addEventListener('click', spec.onTap);
    return tile;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g,
      c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  // ──────────── Drill playlist (pool + techniques as one long deck) ─────
  // When the user hits Next past the end of pool, we roll into the first
  // technique; past the end of that technique, into the next, and so on.
  // Only decks with cards are included in the playlist.
  let playlist = [];       // [{kind, name, family, cards, title, rule}]
  let playlistIdx = 0;     // which deck we're in
  // ``idx`` is the card index within the current deck (existing global).

  function buildPlaylist() {
    // Single continuous deck — pool items + technique items flow in one
    // paginated stream.  DATA.cards already has the pagination done by
    // build_drill_data.py (6×6 = 36 cells/page, with continuation markers).
    playlist = [{
      kind: 'flow',
      name: 'drills',
      family: 'pool',
      cards: (DATA.cards || []).slice(),
      title: 'Drills',
      rule: '',
    }];
  }

  // ──────────── Drill screen ────────────
  function enterDrill(kind, arg) {
    if (!playlist.length) buildPlaylist();
    playlistIdx = 0;    // single-deck model
    // `arg` is the starting card index when kind === 'jump'; otherwise 0.
    idx = (kind === 'jump' && typeof arg === 'number') ? arg : 0;
    loadDeck();
    $('home').style.display = 'none';
    $('drill').classList.add('active');
  }

  function loadDeck() {
    const deck = playlist[playlistIdx];
    mode = deck.kind;
    techniqueName = (deck.kind === 'technique') ? deck.name : null;
    cards = deck.cards;
    $('drill-title').textContent = deck.title;
    $('drill-rule').textContent  = deck.rule;
    setBanner(deck.family);
    renderCard();
  }

  function setBanner(family) {
    const b = $('drill-banner');
    b.className = '';
    b.classList.add(family);
  }

  function exitDrill() {
    mode = 'home';
    $('drill').classList.remove('active');
    $('home').style.display = 'flex';
  }

  function renderCard() {
    const card = $('card');
    const n = cards.length;
    // Global counter: card N of M across the whole playlist.
    let cardsBefore = 0;
    for (let i = 0; i < playlistIdx; i++) cardsBefore += playlist[i].cards.length;
    const globalIdx   = cardsBefore + idx + 1;
    const globalTotal = playlist.reduce((acc, d) => acc + d.cards.length, 0);
    $('drill-counter').textContent = globalIdx + ' / ' + globalTotal;
    // Enable state: Prev disabled at first card of first deck; Next disabled
    // at last card of last deck.
    const atVeryStart = (playlistIdx === 0 && idx <= 0);
    const atVeryEnd   = (playlistIdx === playlist.length - 1 && idx >= n - 1);
    $('btn-prev').disabled = atVeryStart;
    $('btn-next').disabled = atVeryEnd;

    if (!n) {
      card.innerHTML =
        '<div class="empty-note">No entries for this technique yet.<br>' +
        '(The SDD inventory has no concrete pattern-pairs here.)</div>';
      return;
    }

    const c = cards[idx];
    $('drill-title').textContent = 'Drill ' + (idx + 1) + ' / ' + n;
    card.innerHTML = renderFlowCard(c);
  }

  function renderFlowCard(c) {
    const frags = (c.items || []).map(it => {
      if (it.type === 'section') {
        return `<span class="pool-frac chapter-cell pool-family">
                  <span class="chapter-chapter">Pool</span>
                  <span class="chapter-section">${escapeHtml(it.chord)}</span>
                </span>`;
      }
      if (it.type === 'fraction') {
        return `<span class="pool-frac">
                  <span class="pool-frac-ipool">${escapeHtml(it.ipool)}</span>
                  <span class="pool-frac-notes">
                    <span class="lh">${escapeHtml(it.lh_notes)}</span><span class="rh">${escapeHtml(it.rh_notes)}</span>
                  </span>
                </span>`;
      }
      if (it.type === 'tech_label') {
        return `<span class="pool-frac chapter-cell tech-${it.family}">
                  <span class="chapter-chapter">${escapeHtml(it.technique)}</span>
                  <span class="chapter-section">${escapeHtml(it.label)}</span>
                </span>`;
      }
      if (it.type === 'tech_pair') {
        const fromHtml = `<span class="lh">${escapeHtml(hasLH(it.from))}</span>` +
                         `<span class="rh">${escapeHtml(hasRH(it.from))}</span>`;
        const toHtml = it.to
          ? `<span class="tech-frac-to"><span class="lh">${escapeHtml(hasLH(it.to))}</span>` +
            `<span class="rh">${escapeHtml(hasRH(it.to))}</span></span>`
          : '';
        return `<span class="pool-frac tech-frac">` +
                 `<span class="tech-frac-from">${fromHtml}</span>` +
                 toHtml +
               `</span>`;
      }
      return '';
    }).join(' ');
    return `<div class="pool-paragraph">${frags}</div>`;
  }

  function renderPoolCard(c) {
    // Card items is a mix of section markers and fractions.  Section
    // markers become coloured chapter cells ("Pool I", "Pool ii", ...),
    // fractions become ipool/notes stacks.
    const frags = (c.items || []).map(it => {
      if (it.type === 'section') {
        return `<span class="pool-frac chapter-cell pool-family">
                  <span class="chapter-chapter">Pool</span>
                  <span class="chapter-section">${escapeHtml(it.chord)}</span>
                </span>`;
      }
      return `<span class="pool-frac">
                <span class="pool-frac-ipool">${escapeHtml(it.ipool)}</span>
                <span class="pool-frac-notes">
                  <span class="lh">${escapeHtml(it.lh_notes)}</span><span class="rh">${escapeHtml(it.rh_notes)}</span>
                </span>
              </span>`;
    }).join(' ');
    return `<div class="pool-paragraph">${frags}</div>`;
  }

  function renderTechCard(c) {
    // Card body = one function-pair (e.g. "I-vi") — flowing paragraph of
    // stacked from/to pairs.  Each pair is an inline block with `from` on
    // top and `to` below, echoing the pool card's ipool/notes stack.
    const frags = (c.pairs || []).map(p => {
      const fromSpan = `<span class="lh">${escapeHtml(hasLH(p.from))}</span>` +
                       `<span class="rh">${escapeHtml(hasRH(p.from))}</span>`;
      const toHtml = p.to
        ? `<span class="tech-frac-to"><span class="lh">${escapeHtml(hasLH(p.to))}</span>` +
          `<span class="rh">${escapeHtml(hasRH(p.to))}</span></span>`
        : '';
      return `<span class="tech-frac">` +
               `<span class="tech-frac-from">${fromSpan}</span>` +
               toHtml +
             `</span>`;
    }).join(' ');
    const deck = playlist[playlistIdx];
    const label = `<span class="pool-frac chapter-cell tech-${deck.family}">
                     <span class="chapter-chapter">${escapeHtml(deck.title)}</span>
                     <span class="chapter-section">${escapeHtml(c.label)}</span>
                   </span>`;
    return `<div class="pool-paragraph">${label}${frags}</div>`;
  }

  // Split a concatenated notes string like "cegDFA" into LH (lowercase
  // leading run) and RH (UPPERCASE trailing run).  In key of C every
  // pitch is a single letter so the split is clean at the first uppercase.
  function hasLH(s) {
    const m = String(s).match(/^[a-z]+/);
    return m ? m[0] : '';
  }
  function hasRH(s) {
    return String(s).slice(hasLH(s).length);
  }

  function step(delta) {
    if (!cards || !cards.length) return;
    let newIdx = idx + delta;
    let crossedDeck = false;
    // Forward past end → next deck's first card.
    while (newIdx >= cards.length) {
      if (playlistIdx >= playlist.length - 1) {
        newIdx = cards.length - 1;  // clamp at the very last card of the deck
        break;
      }
      newIdx -= cards.length;
      playlistIdx += 1;
      cards = playlist[playlistIdx].cards;
      crossedDeck = true;
    }
    // Back past start → previous deck's last card.
    while (newIdx < 0) {
      if (playlistIdx <= 0) {
        newIdx = 0;
        break;
      }
      playlistIdx -= 1;
      cards = playlist[playlistIdx].cards;
      newIdx += cards.length;
      crossedDeck = true;
    }
    if (newIdx === idx && !crossedDeck) return;
    const cardEl = $('card');
    cardEl.classList.remove('swipe-left', 'swipe-right');
    void cardEl.offsetWidth;
    cardEl.classList.add(delta > 0 ? 'swipe-left' : 'swipe-right');
    idx = newIdx;
    if (crossedDeck) loadDeck();
    else renderCard();
  }

  // ──────────── Input: tap + swipe ────────────
  $('home-btn').addEventListener('click', exitDrill);
  $('btn-prev').addEventListener('click', () => step(-1));
  $('btn-next').addEventListener('click', () => step(+1));
  $('btn-mid').addEventListener('click', () => step(+1));

  // Retab screen button wiring
  $('retab-home-btn').addEventListener('click', exitRetab);
  $('retab-btn-prev').addEventListener('click', () => { retabIdx--; showRetabCard(); });
  $('retab-btn-next').addEventListener('click', () => { retabIdx++; showRetabCard(); });

  $('retabhymnal-home-btn').addEventListener('click', exitRetabHymnal);
  $('retabhymnal-btn-prev').addEventListener('click', () => { retabHymnalIdx--; showRetabHymnalCard(); });
  $('retabhymnal-btn-next').addEventListener('click', () => { retabHymnalIdx++; showRetabHymnalCard(); });
  $('retabhymnal-search').addEventListener('input', (e) => renderRetabHymnalIndex(e.target.value));
  $('retabhymnal-levels').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-level]');
    if (!btn) return;
    const lvl = parseInt(btn.getAttribute('data-level'), 10);

    retabHymnalLevel = lvl;
    const siblings = $('retabhymnal-levels').querySelectorAll('button[data-level]');
    siblings.forEach((b) => b.classList.toggle('active', b === btn));
    showRetabHymnalCard();
  });

  // Reharm Hymnal screen button wiring
  $('boddiehymnal-home-btn').addEventListener('click', exitBoddieHymnal);
  $('boddiehymnal-btn-prev').addEventListener('click', () => { boddieHymnalIdx--; showBoddieHymnalCard(); });
  $('boddiehymnal-btn-next').addEventListener('click', () => { boddieHymnalIdx++; showBoddieHymnalCard(); });
  $('boddiehymnal-search').addEventListener('input', (e) => renderBoddieHymnalIndex(e.target.value));
  $('boddiedrill-home-btn').addEventListener('click', exitBoddieDrills);
  $('boddiedrill-btn-prev').addEventListener('click', () => { boddieDrillIdx--; showBoddieDrillCard(); });
  $('boddiedrill-btn-next').addEventListener('click', () => { boddieDrillIdx++; showBoddieDrillCard(); });
  $('boddiesource-home-btn').addEventListener('click', exitBoddieSource);
  $('boddiesource-btn-prev').addEventListener('click', () => { boddieSourcePage--; showBoddieSourcePage(); });
  $('boddiesource-btn-next').addEventListener('click', () => { boddieSourcePage++; showBoddieSourcePage(); });
  $('ebshapes-home-btn').addEventListener('click', exitEbShapes);
  $('ebshapes-btn-prev').addEventListener('click', () => { ebShapesIdx--; showEbShapesCard(); });
  $('ebshapes-btn-next').addEventListener('click', () => { ebShapesIdx++; showEbShapesCard(); });
  $('reharmhymnal-home-btn').addEventListener('click', exitReharmHymnal);
  $('reharmhymnal-btn-prev').addEventListener('click', () => { reharmHymnalIdx--; showReharmHymnalCard(); });
  $('reharmhymnal-btn-next').addEventListener('click', () => { reharmHymnalIdx++; showReharmHymnalCard(); });
  $('reharmhymnal-search').addEventListener('input', (e) => renderReharmHymnalIndex(e.target.value));
  $('reharmhymnal-levels').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-level]');
    if (!btn) return;
    const lvl = parseInt(btn.getAttribute('data-level'), 10);
    if (!lvl) return;
    reharmHymnalLevel = lvl;
    const siblings = $('reharmhymnal-levels').querySelectorAll('button[data-level]');
    siblings.forEach(b => b.classList.toggle('active', b === btn));
    showReharmHymnalCard();
  });

  // Reharm sub-page button wiring
  $('reharm-back-btn').addEventListener('click', () => exitReharm(false));

  // Tap anywhere on card = next; two-finger tap = prev (rare); use swipe
  // gesture to move backwards intuitively.
  const cardEl = $('card');
  cardEl.addEventListener('click', (e) => {
    // Click on the right half = next, left half = prev.
    const rect = cardEl.getBoundingClientRect();
    const x = (e.clientX || 0) - rect.left;
    step(x < rect.width * 0.35 ? -1 : +1);
  });

  // Swipe detection.
  let tStartX = null, tStartY = null, tStartT = 0;
  cardEl.addEventListener('touchstart', (e) => {
    const t = e.changedTouches[0];
    tStartX = t.clientX; tStartY = t.clientY; tStartT = Date.now();
  }, { passive: true });
  cardEl.addEventListener('touchend', (e) => {
    if (tStartX == null) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - tStartX, dy = t.clientY - tStartY;
    const dt = Date.now() - tStartT;
    tStartX = tStartY = null;
    if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
    if (dt > 600) return;
    // Prevent the click fallback from also firing. (Many WebViews will
    // generate a click after touchend; guard by a short deadzone.)
    e.preventDefault();
    step(dx < 0 ? +1 : -1);
  }, { passive: false });

  // Keyboard (desktop testing).
  document.addEventListener('keydown', (e) => {
    if (mode === 'home') return;
    if (e.key === 'ArrowRight' || e.key === ' ') step(+1);
    else if (e.key === 'ArrowLeft') step(-1);
    else if (e.key === 'Escape') exitDrill();
  });

  // ──────────── Boot ────────────
  loadData();
})();
</script>
</body>
</html>
