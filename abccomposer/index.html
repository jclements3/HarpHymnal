<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#bd93f9"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<title>ABC Composer</title>

<link rel="stylesheet" href="vendor/codemirror.css"/>
<link rel="stylesheet" href="vendor/dracula.css"/>
<link rel="stylesheet" href="vendor/dialog.css"/>

<style>
  :root {
    --bg:        #1e1f29;
    --bg-alt:    #282a36;
    --panel:     #21222c;
    --line:      #44475a;
    --ink:       #f8f8f2;
    --muted:     #6272a4;
    --accent:    #bd93f9;
    --green:     #50fa7b;
    --pink:      #ff79c6;
    --orange:    #ffb86c;
    --red:       #ff5555;
    --user-bg:   #44475a;
    --asst-bg:   #2d2f3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100vh; width: 100vw;
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
    overflow: hidden;
  }

  #app { display: flex; flex-direction: column; height: 100%; width: 100%; }

  /* ─── toolbar ─── */
  #toolbar {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: var(--bg-alt);
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }
  #toolbar .brand {
    font-weight: 700; color: var(--accent); font-size: 15px;
    margin-right: 14px; letter-spacing: 0.5px;
  }
  #toolbar input[type=text] {
    background: #44475a; color: var(--ink);
    border: 1px solid var(--muted); border-radius: 5px;
    padding: 6px 10px; font-size: 14px; width: 240px;
    font-family: inherit;
  }
  #toolbar input[type=text]:focus {
    outline: none; border-color: var(--accent);
  }
  #toolbar button {
    background: #44475a; color: var(--ink);
    border: 1px solid var(--muted); border-radius: 5px;
    padding: 6px 12px; cursor: pointer; font-size: 14px;
    font-weight: 500;
    font-family: inherit;
  }
  #toolbar button:hover { background: var(--muted); border-color: var(--ink); }
  #toolbar button.primary {
    background: var(--accent); color: var(--bg);
    border-color: var(--accent); font-weight: 600;
  }
  #toolbar button.primary:hover { background: #d6acff; border-color: #d6acff; }
  #toolbar #btn-settings { font-size: 18px; padding: 4px 10px; }
  #toolbar .spacer { flex: 1; }
  #toolbar .status { color: var(--muted); font-size: 12px; }
  #toolbar .status.ok { color: var(--green); }
  #toolbar .status.err { color: var(--red); }

  /* ─── panes ─── */
  #panes {
    flex: 1; display: flex; flex-direction: row;
    min-height: 0;
  }
  .pane {
    display: flex; flex-direction: column;
    min-width: 0; min-height: 0;
    border-right: 1px solid var(--line);
  }
  .pane:last-child { border-right: none; }
  .pane-editor { flex: 0 0 50%; }
  .pane-render { flex: 0 0 25%; background: #f8f8f2; color: #21222c; }
  .pane-chat   { flex: 0 0 25%; background: var(--bg-alt); }

  /* ─── pane double-tap zoom ─── */
  #panes.panes-zoomed-editor .pane-render,
  #panes.panes-zoomed-editor .pane-chat,
  #panes.panes-zoomed-render .pane-editor,
  #panes.panes-zoomed-render .pane-chat,
  #panes.panes-zoomed-chat   .pane-editor,
  #panes.panes-zoomed-chat   .pane-render { display: none; }
  #panes.panes-zoomed-editor .pane-editor,
  #panes.panes-zoomed-render .pane-render,
  #panes.panes-zoomed-chat   .pane-chat { flex: 1 1 100%; border-right: none; }

  /* ─── stripchart (dark motif) ─── */
  /* abcjs sets inline style="display: inline-block" on #abcjs-target after
     it renders, which trumps a stylesheet `display:none` -- so the score /
     stripchart toggle needs !important to force the override. */
  #stripchart-target {
    width: 100%; height: 100%; min-height: 100%;
    background: var(--bg);          /* dark dracula bg */
    color: var(--ink);
    overflow: auto; padding: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
    display: none !important;
  }
  #stripchart-target.show { display: block !important; }
  #abcjs-target.hide { display: none !important; }
  .strip-row {
    position: relative;
    margin-bottom: 10px;
    border: 1px solid var(--line);
    background: var(--bg-alt);
  }
  .strip-row svg { display: block; width: 100%; }
  #toolbar #btn-view { font-family: inherit; min-width: 36px; }

  .pane-header {
    flex: 0 0 auto;
    padding: 4px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted);
  }
  .pane-render .pane-header { background: #44475a; color: #f8f8f2; }
  .pane-body { flex: 1; min-height: 0; overflow: auto; }

  /* ─── editor ─── */
  .CodeMirror {
    height: 100% !important;
    font-family: "JetBrains Mono", "Fira Code", "DejaVu Sans Mono",
                 "Liberation Mono", "Consolas", monospace;
    font-size: 16px;
    line-height: 1.5;
  }
  .cm-abc-header { color: var(--orange); font-weight: 600; }
  .cm-abc-comment { color: var(--muted); font-style: italic; }
  .cm-abc-bar { color: var(--pink); font-weight: 600; }
  .cm-abc-decoration { color: var(--green); }
  .cm-abc-chordsym { color: var(--accent); }
  .cm-abc-bracket { color: var(--pink); }
  .cm-abc-note { color: var(--ink); }
  .cm-abc-accidental { color: var(--orange); }
  .cm-fat-cursor { background: var(--green) !important; opacity: 0.6 !important; }

  /* ─── render pane ─── */
  #abcjs-target {
    padding: 16px;
    background: #f8f8f2;
    min-height: 100%;
  }
  #abcjs-target svg { background: #f8f8f2; }
  .render-error {
    color: #b03030; padding: 16px; font-family: monospace;
    background: #fff5f5; white-space: pre-wrap;
  }

  /* ─── chat pane ─── */
  .chat-history {
    flex: 1; overflow-y: auto; padding: 8px;
    display: flex; flex-direction: column; gap: 8px;
    font-size: 13px;
  }
  .msg {
    padding: 8px 10px; border-radius: 6px;
    white-space: pre-wrap; word-wrap: break-word;
    line-height: 1.4;
  }
  .msg.user      { background: var(--user-bg); color: var(--ink); }
  .msg.assistant { background: var(--asst-bg); color: var(--ink); border: 1px solid var(--line); }
  .msg.error     { background: #4a1f1f; color: #ff8a8a; border: 1px solid #6a3030; }
  .msg .role {
    display: block; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); margin-bottom: 4px;
  }
  .msg pre {
    background: var(--bg); border: 1px solid var(--line);
    border-radius: 4px; padding: 6px 8px; margin: 6px 0;
    overflow-x: auto; font-size: 12px;
    font-family: "JetBrains Mono", "Fira Code", monospace;
  }
  .msg .apply-btn {
    display: inline-block; margin-top: 4px; font-size: 11px;
    padding: 3px 8px; border: 1px solid var(--green); color: var(--green);
    background: transparent; border-radius: 3px; cursor: pointer;
  }
  .msg .apply-btn:hover { background: var(--green); color: var(--bg); }

  .chat-input-wrap {
    flex: 0 0 auto;
    border-top: 1px solid var(--line);
    padding: 8px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .chat-input {
    width: 100%; min-height: 60px; resize: vertical;
    background: var(--panel); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 6px 8px; font-size: 13px;
    font-family: inherit;
  }
  .chat-input:focus { outline: none; border-color: var(--accent); }
  .chat-controls {
    display: flex; gap: 6px; align-items: center;
  }
  .chat-controls button {
    background: var(--panel); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 5px 10px; cursor: pointer; font-size: 12px;
    font-family: inherit;
  }
  .chat-controls button.primary {
    border-color: var(--accent); color: var(--accent);
  }
  .chat-controls .hint {
    flex: 1; font-size: 10px; color: var(--muted); text-align: right;
  }

  /* ─── settings modal ─── */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg-alt); color: var(--ink);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 20px; min-width: 480px; max-width: 90vw;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { font-size: 16px; margin-bottom: 12px; color: var(--accent); }
  .modal label {
    display: block; font-size: 12px; color: var(--muted);
    margin-top: 12px; margin-bottom: 4px; text-transform: uppercase;
    letter-spacing: 1px;
  }
  .modal input, .modal select, .modal textarea {
    width: 100%; background: var(--panel); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 6px 8px; font-size: 13px; font-family: inherit;
  }
  .modal textarea { min-height: 100px; resize: vertical; font-family: monospace; }
  .modal .row { display: flex; gap: 12px; }
  .modal .row > * { flex: 1; }
  .modal .actions {
    margin-top: 16px; display: flex; gap: 8px; justify-content: flex-end;
  }
  .modal button {
    background: var(--panel); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 6px 14px; cursor: pointer; font-family: inherit;
  }
  .modal button.primary { border-color: var(--accent); color: var(--accent); }

  /* CM dialog overrides for vim ex commands */
  .CodeMirror-dialog {
    background: var(--bg-alt); color: var(--ink); border-color: var(--line);
  }
  .CodeMirror-dialog input { color: var(--ink); }
</style>
</head>
<body>

<div id="app">

  <div id="toolbar">
    <span class="brand">ABC Composer</span>
    <input type="text" id="filename" value="untitled.abc" spellcheck="false"/>
    <button id="btn-new">New</button>
    <button id="btn-open">Open</button>
    <input type="file" id="file-input" accept=".abc,text/plain" style="display:none"/>
    <button id="btn-save">Save</button>
    <button id="btn-play" class="primary">▶ Play</button>
    <button id="btn-stop">■ Stop</button>
    <button id="btn-view" title="Toggle score / stripchart view">♫</button>
    <span class="spacer"></span>
    <span class="status" id="render-status">ready</span>
    <button id="btn-settings">⚙</button>
  </div>

  <div id="panes">

    <div class="pane pane-editor">
      <div class="pane-header">
        <span>Editor — vim mode</span>
      </div>
      <div class="pane-body">
        <textarea id="abc-source"></textarea>
      </div>
    </div>

    <div class="pane pane-render">
      <div class="pane-header" style="color:#21222c;">Score (live abcjs render)</div>
      <div class="pane-body">
        <div id="abcjs-target"></div>
        <div id="stripchart-target"></div>
      </div>
    </div>

    <div class="pane pane-chat">
      <div class="pane-header">Claude</div>
      <div class="chat-history" id="chat-history"></div>
      <div class="chat-input-wrap">
        <textarea id="chat-input" class="chat-input"
          placeholder="Ask Claude to compose / fix / harmonize / explain... (Cmd+Enter to send)"></textarea>
        <div class="chat-controls">
          <button id="btn-clear-chat">Clear</button>
          <span class="hint">⌘↵ send</span>
          <button id="btn-send" class="primary">Send</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ─── settings modal ─── -->
<div class="modal-bg" id="settings-modal">
  <div class="modal">
    <h2>Settings</h2>

    <label>Anthropic API key</label>
    <input type="password" id="cfg-api-key" placeholder="sk-ant-..." autocomplete="off"/>
    <div style="font-size:11px;color:var(--muted);margin-top:4px">
      Stored in this browser's localStorage only. Calls go direct to api.anthropic.com.
    </div>

    <div class="row">
      <div>
        <label>Model</label>
        <select id="cfg-model">
          <option value="claude-opus-4-7">claude-opus-4-7 (Opus 4.7)</option>
          <option value="claude-sonnet-4-6">claude-sonnet-4-6 (Sonnet 4.6)</option>
          <option value="claude-haiku-4-5-20251001">claude-haiku-4-5 (Haiku 4.5)</option>
        </select>
      </div>
      <div>
        <label>Max tokens</label>
        <input type="number" id="cfg-max-tokens" value="4096" min="256" max="64000"/>
      </div>
    </div>

    <label>System prompt</label>
    <textarea id="cfg-system-prompt"></textarea>
    <div style="font-size:11px;color:var(--muted);margin-top:4px">
      The current ABC source is appended to every request automatically as
      &lt;current_abc&gt;...&lt;/current_abc&gt; — don't include it here.
    </div>

    <div class="actions">
      <button id="btn-cfg-cancel">Cancel</button>
      <button id="btn-cfg-save" class="primary">Save</button>
    </div>
  </div>
</div>

<!-- ─── vendored libs ─── -->
<script src="vendor/codemirror.js"></script>
<script src="vendor/dialog.js"></script>
<script src="vendor/searchcursor.js"></script>
<script src="vendor/search.js"></script>
<script src="vendor/matchbrackets.js"></script>
<script src="vendor/vim.js"></script>
<script src="vendor/abcjs-basic-min.js"></script>

<script>
"use strict";

// ────────────────────────────────────────────────────────────────────
// 1.  Inline ABC syntax mode for CodeMirror
// ────────────────────────────────────────────────────────────────────
CodeMirror.defineMode("abc", function () {
  const HEADER_RE = /^[A-Za-z]:/;
  return {
    startState() { return { inChord: false, inString: false }; },
    token(stream, state) {
      if (stream.sol() && stream.match(HEADER_RE, false)) {
        stream.skipToEnd();
        return "abc-header";
      }
      const ch = stream.peek();
      if (state.inString) {
        while ((stream.next()) != null) {
          if (stream.string[stream.pos - 1] === '"') { state.inString = false; break; }
        }
        return "abc-chordsym";
      }
      if (ch === "%") { stream.skipToEnd(); return "abc-comment"; }
      if (ch === '"') { stream.next(); state.inString = true; return "abc-chordsym"; }
      if (ch === "!") {
        stream.next();
        while ((stream.next()) != null) {
          if (stream.string[stream.pos - 1] === "!") break;
        }
        return "abc-decoration";
      }
      if (ch === "[" || ch === "]") { stream.next(); return "abc-bracket"; }
      if (ch === "|" || ch === ":") { stream.next(); return "abc-bar"; }
      if (ch === "^" || ch === "_" || ch === "=") { stream.next(); return "abc-accidental"; }
      if (/[A-Ga-gzZxX]/.test(ch)) { stream.next(); return "abc-note"; }
      stream.next();
      return null;
    }
  };
});

// ────────────────────────────────────────────────────────────────────
// 2.  Defaults + localStorage
// ────────────────────────────────────────────────────────────────────
const DEFAULT_ABC = [
  "X:1",
  "T:Untitled",
  "C:",
  "M:4/4",
  "L:1/8",
  "Q:1/4=80",
  "K:C",
  "% type ABC here. Esc for vim normal mode. : for ex commands.",
  "|: CDEF GABc | cBAG FEDC :|",
  ""
].join("\n");

const DEFAULT_SYSTEM = [
  "You are an expert ABC notation composer collaborating with a harpist on the HarpHymnal project.",
  "You write valid ABC 2.1 — single tunes with X/T/M/L/K headers, body music code, optional V: voices, optional w: lyrics.",
  "When the user asks for a change, return the COMPLETE updated ABC inside a single ```abc fenced code block, not a diff.",
  "When asked to explain, answer in prose without code fences.",
  "Default key C major / 4/4 / L:1/8 unless the user specifies otherwise.",
  "Lever-harp range: C2..G7. Pedal-harp: same. Bass clef voices use V:2 clef=bass."
].join(" ");

const LS = {
  abc:    "abccomposer.abc",
  fname:  "abccomposer.filename",
  key:    "abccomposer.apiKey",
  model:  "abccomposer.model",
  maxtok: "abccomposer.maxTokens",
  sys:    "abccomposer.systemPrompt",
  hist:   "abccomposer.chatHistory",
  zoom:   "abccomposer.zoom",
  view:   "abccomposer.view",
};
function lsGet(k, fallback) {
  try { const v = localStorage.getItem(k); return v == null ? fallback : v; }
  catch (e) { return fallback; }
}
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }

// ────────────────────────────────────────────────────────────────────
// 3.  CodeMirror init
// ────────────────────────────────────────────────────────────────────
const ta = document.getElementById("abc-source");
ta.value = lsGet(LS.abc, DEFAULT_ABC);

const cm = CodeMirror.fromTextArea(ta, {
  mode: "abc",
  theme: "dracula",
  keyMap: "vim",
  lineNumbers: true,
  lineWrapping: true,
  matchBrackets: true,
  showCursorWhenSelecting: true,
});

// ────────────────────────────────────────────────────────────────────
// 4.  Live abcjs render (debounced) + stripchart view
// ────────────────────────────────────────────────────────────────────
const renderTarget = document.getElementById("abcjs-target");
const stripTarget  = document.getElementById("stripchart-target");
const renderStatus = document.getElementById("render-status");
let visualObj = null;
let synthControl = null;
let viewMode = lsGet(LS.view, "score"); // "score" | "stripchart"

function setStatus(text, cls) {
  renderStatus.textContent = text;
  renderStatus.className = "status" + (cls ? " " + cls : "");
}

function renderScore(abc) {
  try {
    const out = ABCJS.renderAbc(renderTarget, abc, {
      responsive: "resize",
      add_classes: true,
    });
    visualObj = out && out[0] ? out[0] : null;
    setStatus("ok", "ok");
  } catch (e) {
    renderTarget.innerHTML = '<div class="render-error">' +
      String(e && e.message || e) + '</div>';
    visualObj = null;
    setStatus("render error", "err");
  }
}

// --- Stripchart rendering --------------------------------------------
// Rainbow color per scale degree (1..7). Accidentals shift hue ±15°.
const DEGREE_HUE = { 1: 0, 2: 30, 3: 55, 4: 120, 5: 220, 6: 270, 7: 300 };
// MIDI semitone offsets for major-scale degrees from tonic.
const MAJOR_DEGREE_BY_SEMI = {
  0: { deg: 1, alt: 0 },  1: { deg: 2, alt: -1 },
  2: { deg: 2, alt: 0 },  3: { deg: 3, alt: -1 },
  4: { deg: 3, alt: 0 },  5: { deg: 4, alt: 0 },
  6: { deg: 4, alt: +1 }, 7: { deg: 5, alt: 0 },
  8: { deg: 6, alt: -1 }, 9: { deg: 6, alt: 0 },
  10:{ deg: 7, alt: -1 },11:{ deg: 7, alt: 0 },
};
const KEY_TONIC_PC = {
  "C":0,"G":7,"D":2,"A":9,"E":4,"B":11,"F#":6,"C#":1,
  "F":5,"Bb":10,"Eb":3,"Ab":8,"Db":1,"Gb":6,"Cb":11,
  "Am":9,"Em":4,"Bm":11,"F#m":6,"C#m":1,"G#m":8,"D#m":3,"A#m":10,
  "Dm":2,"Gm":7,"Cm":0,"Fm":5,"Bbm":10,"Ebm":3,"Abm":8,
};

function colorForPitch(midi, tonicPc) {
  const semi = ((midi - tonicPc) % 12 + 12) % 12;
  const info = MAJOR_DEGREE_BY_SEMI[semi] || { deg: 1, alt: 0 };
  const hue = (DEGREE_HUE[info.deg] + info.alt * 15 + 360) % 360;
  const sat = 80, lit = info.alt === 0 ? 50 : (info.alt > 0 ? 60 : 40);
  return "hsl(" + hue + "," + sat + "%," + lit + "%)";
}

// abcjs pitch (note.pitches[i].pitch) is its own scheme: integer where
// 0 = middle C in treble (C4 in concert).  Convert to MIDI by +60.
function abcPitchToMidi(p) { return p + 60; }

function extractStripchartData(vobj) {
  // Returns { tonicPc, lines: [ { events: [{startBeat, durBeats, midis[], chord, isRest, barAt}], totalBeats, barPositions:[] } ] }
  if (!vobj || !vobj.lines) return null;
  const keyName = (vobj.getKeySignature && vobj.getKeySignature().root) || "C";
  const keyMode = (vobj.getKeySignature && vobj.getKeySignature().mode) || "";
  const lookup = keyName + (keyMode === "m" ? "m" : "");
  const tonicPc = (KEY_TONIC_PC[lookup] != null) ? KEY_TONIC_PC[lookup] : 0;

  const lines = [];
  for (const line of vobj.lines) {
    if (!line.staff) continue;
    // Use the first voice on the first staff per line.
    const staff = line.staff[0];
    if (!staff || !staff.voices || !staff.voices[0]) continue;
    const voice = staff.voices[0];
    const events = [];
    let cursor = 0;
    let lastChord = null;
    const barPositions = [0];
    for (const elem of voice) {
      if (elem.el_type === "bar") {
        barPositions.push(cursor);
        continue;
      }
      if (elem.el_type === "note") {
        const dur = (elem.duration || 0) * 8; // duration is fraction of whole note; *8 -> eighth-beat units
        if (elem.chord && elem.chord.length) {
          lastChord = elem.chord[0].name || lastChord;
        }
        if (elem.rest) {
          events.push({ start: cursor, dur, midis: [], chord: elem.chord && elem.chord[0] ? elem.chord[0].name : null, rest: true });
        } else if (elem.pitches && elem.pitches.length) {
          const midis = elem.pitches.map(p => abcPitchToMidi(p.pitch));
          events.push({ start: cursor, dur, midis, chord: elem.chord && elem.chord[0] ? elem.chord[0].name : null, rest: false });
        }
        cursor += dur;
      }
    }
    if (barPositions[barPositions.length - 1] !== cursor) barPositions.push(cursor);
    lines.push({ events, totalBeats: cursor, barPositions });
  }
  return { tonicPc, lines };
}

// Stripchart playhead state -- populated per-render, consumed by the
// requestAnimationFrame loop in startStripchartPlayback().
let stripState = null;
let stripRafId = null;
let stripStartedAtMs = 0;

function setPlayheadBeat(beat) {
  if (!stripState) return;
  for (let i = 0; i < stripState.lines.length; i++) {
    const ln = stripState.lines[i];
    const ph = stripTarget.querySelector('.strip-row[data-row="' + i + '"] .playhead');
    if (!ph) continue;
    if (beat >= ln.startBeat && beat < ln.endBeat) {
      const x = (beat - ln.startBeat) * ln.xPerBeat;
      ph.setAttribute("transform", "translate(" + x.toFixed(1) + ",0)");
      ph.setAttribute("opacity", "1");
    } else if (beat >= ln.endBeat) {
      // park playhead at end of finished rows
      ph.setAttribute("transform", "translate(" + (ln.totalBeats * ln.xPerBeat).toFixed(1) + ",0)");
      ph.setAttribute("opacity", "0.3");
    } else {
      ph.setAttribute("transform", "translate(0,0)");
      ph.setAttribute("opacity", "0.3");
    }
  }
}

function startStripchartPlayback() {
  if (!stripState) return;
  if (stripRafId) cancelAnimationFrame(stripRafId);
  const beatsPerMs = stripState.qpm / 60000;
  stripStartedAtMs = performance.now();
  function step() {
    const elapsed = performance.now() - stripStartedAtMs;
    const beat = elapsed * beatsPerMs;
    setPlayheadBeat(beat);
    if (beat < stripState.totalBeats) {
      stripRafId = requestAnimationFrame(step);
    } else {
      stripRafId = null;
    }
  }
  stripRafId = requestAnimationFrame(step);
}

function stopStripchartPlayback() {
  if (stripRafId) { cancelAnimationFrame(stripRafId); stripRafId = null; }
  setPlayheadBeat(0);
}

function tempoQpmFromAbc(abc) {
  // Q:1/4=80 -> 80 ; Q:80 -> 80 ; default 120.
  const m = /^\s*Q\s*:\s*(?:\d+\/\d+\s*=\s*)?(\d+)/m.exec(abc || "");
  return m ? parseInt(m[1], 10) : 120;
}

function renderStripchart(abc) {
  // Parse only — don't disturb the score DOM.
  let vobj = null;
  try {
    if (ABCJS.parseOnly) {
      const parsed = ABCJS.parseOnly(abc);
      vobj = parsed && parsed[0] ? parsed[0] : null;
    } else {
      // Fallback: render off-screen to grab visualObj.
      const tmp = document.createElement("div");
      const out = ABCJS.renderAbc(tmp, abc, { add_classes: true });
      vobj = out && out[0] ? out[0] : null;
    }
  } catch (e) {
    stripTarget.innerHTML = '<div class="render-error">' +
      String(e && e.message || e) + '</div>';
    setStatus("stripchart parse error", "err");
    return;
  }

  const data = extractStripchartData(vobj);
  if (!data || !data.lines.length) {
    stripTarget.innerHTML = '<div class="render-error">No notes to chart.</div>';
    setStatus("stripchart: empty", "err");
    return;
  }

  // Determine vertical pitch range across all lines.
  let pMin = 127, pMax = 0;
  for (const ln of data.lines) for (const ev of ln.events)
    for (const m of ev.midis) { if (m < pMin) pMin = m; if (m > pMax) pMax = m; }
  if (pMin > pMax) { pMin = 60; pMax = 72; }
  pMin -= 1; pMax += 1;

  const ROW_H = 110;
  const CHORD_H = 28;
  const BAR_NUM_H = 16;          // top strip with bar numbers (per row)
  const GUTTER_W = 28;           // left gutter with scale-degree labels
  const containerW = stripTarget.clientWidth || 600;
  const fullW = Math.max(200, containerW - 24);
  const innerW = fullW - GUTTER_W;

  // Build per-row metadata for the playhead loop. Row i covers
  // [cumBeats[i], cumBeats[i+1]) in the global timeline.
  const rowMeta = [];
  let cumBeats = 0;
  let cumBars = 0;          // running bar count across all rows

  let html = "";
  for (let li = 0; li < data.lines.length; li++) {
    const ln = data.lines[li];
    if (!ln.totalBeats) continue;
    const xPerBeat = innerW / ln.totalBeats;
    const noteH = (ROW_H - 4) / (pMax - pMin);

    rowMeta.push({
      startBeat: cumBeats,
      endBeat:   cumBeats + ln.totalBeats,
      totalBeats: ln.totalBeats,
      xPerBeat:  xPerBeat,
    });
    cumBeats += ln.totalBeats;

    // Note bars
    let bars = "";
    for (const ev of ln.events) {
      if (ev.rest || !ev.midis.length) continue;
      const x = ev.start * xPerBeat;
      const w = Math.max(2, ev.dur * xPerBeat - 1);
      for (const m of ev.midis) {
        const y = (pMax - m) * noteH;
        const fill = colorForPitch(m, data.tonicPc);
        bars += '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) +
                '" width="' + w.toFixed(1) + '" height="' + Math.max(3, noteH - 1).toFixed(1) +
                '" fill="' + fill + '" stroke="#1e1f29" stroke-width="0.4" rx="1"/>';
      }
    }
    // Bar separators (dim grey on dark bg)
    let seps = "";
    for (const bp of ln.barPositions) {
      const x = bp * xPerBeat;
      seps += '<line x1="' + x.toFixed(1) + '" y1="0" x2="' + x.toFixed(1) +
              '" y2="' + ROW_H + '" stroke="#6272a4" stroke-width="0.5"/>';
    }
    // Faint horizontal pitch grid every 12 semitones
    let grid = "";
    for (let m = Math.ceil(pMin / 12) * 12; m <= pMax; m += 12) {
      const y = (pMax - m) * noteH;
      grid += '<line x1="0" y1="' + y.toFixed(1) + '" x2="' + innerW +
              '" y2="' + y.toFixed(1) + '" stroke="#3a3d4f" stroke-width="0.5"/>';
    }
    // Chord track underneath
    let chordTrack = '<rect x="0" y="0" width="' + innerW + '" height="' + CHORD_H +
                     '" fill="#21222c" stroke="#44475a" stroke-width="0.5"/>';
    // Bar lines on chord track
    for (const bp of ln.barPositions) {
      const x = bp * xPerBeat;
      chordTrack += '<line x1="' + x.toFixed(1) + '" y1="0" x2="' + x.toFixed(1) +
                    '" y2="' + CHORD_H + '" stroke="#44475a" stroke-width="0.5"/>';
    }
    // Chord labels: take first chord seen in each bar window.
    for (let bi = 0; bi < ln.barPositions.length - 1; bi++) {
      const a = ln.barPositions[bi], b = ln.barPositions[bi + 1];
      let label = null;
      for (const ev of ln.events) {
        if (ev.start >= a && ev.start < b && ev.chord) { label = ev.chord; break; }
      }
      if (label) {
        const xMid = (a + b) / 2 * xPerBeat;
        chordTrack += '<text x="' + xMid.toFixed(1) + '" y="' + (CHORD_H - 9) +
                      '" text-anchor="middle" font-size="12" font-weight="600" fill="#f8f8f2">' +
                      escapeHtml(label) + '</text>';
      }
    }

    // Playhead element -- rendered at x=0; SVG transform on .playhead group
    // animates it horizontally during playback. Opacity 0.3 when this row
    // isn't the active one. Bright accent color on dark bg.
    const playhead =
      '<g class="playhead" opacity="0.3" transform="translate(0,0)">' +
        '<polygon points="-5,-2 5,-2 0,6" fill="#ff5555"/>' +
        '<line x1="0" y1="0" x2="0" y2="' + ROW_H +
          '" stroke="#ff5555" stroke-width="1.5" stroke-dasharray="3,2"/>' +
      '</g>';

    // Top strip: bar numbers (cumulative across rows). Each barPosition
    // entry except the last marks the START of a bar.
    let barNums = '<rect x="0" y="0" width="' + innerW + '" height="' + BAR_NUM_H +
                  '" fill="#21222c" stroke="#44475a" stroke-width="0.5"/>';
    for (let bi = 0; bi < ln.barPositions.length - 1; bi++) {
      const x = ln.barPositions[bi] * xPerBeat;
      const xNext = ln.barPositions[bi + 1] * xPerBeat;
      const xMid = (x + xNext) / 2;
      const num = cumBars + bi + 1;
      barNums += '<line x1="' + x.toFixed(1) + '" y1="0" x2="' + x.toFixed(1) +
                 '" y2="' + BAR_NUM_H + '" stroke="#44475a" stroke-width="0.5"/>';
      barNums += '<text x="' + xMid.toFixed(1) + '" y="' + (BAR_NUM_H - 4) +
                 '" text-anchor="middle" font-size="10" font-weight="500" fill="#6272a4">' +
                 num + '</text>';
    }
    cumBars += Math.max(0, ln.barPositions.length - 1);

    // Left gutter: 8 lane labels (1-8) for scale-degree orientation. Even
    // spacing across the row height -- conceptual y-axis legend rather
    // than strict MIDI mapping.
    let gutter = '<rect x="0" y="0" width="' + GUTTER_W + '" height="' + ROW_H +
                 '" fill="#21222c" stroke="#44475a" stroke-width="0.5"/>';
    for (let k = 1; k <= 8; k++) {
      const y = ((8 - k) + 0.5) * (ROW_H / 8);
      gutter += '<text x="' + (GUTTER_W / 2).toFixed(1) + '" y="' + (y + 4).toFixed(1) +
                '" text-anchor="middle" font-size="11" font-weight="600" fill="#bd93f9">' +
                k + '</text>';
    }

    html += '<div class="strip-row" data-row="' + (rowMeta.length - 1) + '">' +
      // Top: bar numbers (full width including gutter offset)
      '<svg viewBox="0 0 ' + fullW + ' ' + BAR_NUM_H + '" preserveAspectRatio="none" height="' + BAR_NUM_H + '">' +
        '<rect x="0" y="0" width="' + GUTTER_W + '" height="' + BAR_NUM_H + '" fill="#1e1f29"/>' +
        '<g transform="translate(' + GUTTER_W + ',0)">' + barNums + '</g>' +
      '</svg>' +
      // Main row: gutter + note grid
      '<svg viewBox="0 0 ' + fullW + ' ' + ROW_H + '" preserveAspectRatio="none" height="' + ROW_H + '">' +
        gutter +
        '<g transform="translate(' + GUTTER_W + ',0)">' +
          grid + seps + bars + playhead +
        '</g>' +
      '</svg>' +
      // Chord track
      '<svg viewBox="0 0 ' + fullW + ' ' + CHORD_H + '" preserveAspectRatio="none" height="' + CHORD_H + '">' +
        '<rect x="0" y="0" width="' + GUTTER_W + '" height="' + CHORD_H + '" fill="#1e1f29"/>' +
        '<g transform="translate(' + GUTTER_W + ',0)">' + chordTrack + '</g>' +
      '</svg>' +
    '</div>';
  }

  stripTarget.innerHTML = html;
  stripState = {
    lines: rowMeta,
    totalBeats: cumBeats,
    qpm: tempoQpmFromAbc(abc),
  };
  setPlayheadBeat(0);
  setStatus("stripchart ok", "ok");
}

const panesEl = document.getElementById("panes");
const ZOOM_CLASSES = {
  editor: "panes-zoomed-editor",
  render: "panes-zoomed-render",
  chat:   "panes-zoomed-chat",
};
function applyZoom(which) {
  for (const k of Object.keys(ZOOM_CLASSES)) panesEl.classList.remove(ZOOM_CLASSES[k]);
  if (which && ZOOM_CLASSES[which]) panesEl.classList.add(ZOOM_CLASSES[which]);
  lsSet(LS.zoom, which || "");
  // Let abcjs and CodeMirror re-flow into the new width.
  setTimeout(() => {
    try { window.dispatchEvent(new Event("resize")); } catch (e) {}
    try { cm.refresh(); } catch (e) {}
    if (viewMode === "stripchart") renderStripchart(cm.getValue());
  }, 30);
}
function toggleZoom(which) {
  const cur = lsGet(LS.zoom, "");
  applyZoom(cur === which ? "" : which);
}

(function wireDoubleTap() {
  // After a touch-detected double-tap fires, the browser will ALSO synthesize
  // a dblclick from the same gesture. Without this guard, both handlers run
  // and toggleZoom fires twice -- zoom-on then zoom-off, looking like a no-op.
  let suppressDblClickUntil = 0;

  const map = [
    ["editor", document.querySelector(".pane-editor")],
    ["render", document.querySelector(".pane-render")],
    ["chat",   document.querySelector(".pane-chat")],
  ];
  for (const [name, el] of map) {
    if (!el) continue;

    el.addEventListener("dblclick", (ev) => {
      if (Date.now() < suppressDblClickUntil) return;     // synthesized after touch
      // Don't hijack double-clicks on text inputs / textareas / buttons.
      const t = ev.target;
      // Bail only for actual interactive controls; .CodeMirror is the
      // editor surface and we want double-tap-to-zoom to work there too.
      if (t && t.closest && t.closest("input, textarea, button, select")) return;
      toggleZoom(name);
    });

    // Pointer-based double-tap detector for touch (works in WebView where
    // dblclick can be delayed or unreliable).
    let lastTap = 0;
    el.addEventListener("pointerdown", (ev) => {
      if (ev.pointerType !== "touch") return;
      const t = ev.target;
      // Bail only for actual interactive controls; .CodeMirror is the
      // editor surface and we want double-tap-to-zoom to work there too.
      if (t && t.closest && t.closest("input, textarea, button, select")) return;
      const now = Date.now();
      if (now - lastTap < 350) {
        ev.preventDefault();
        toggleZoom(name);
        lastTap = 0;
        suppressDblClickUntil = now + 600;   // swallow the synthetic dblclick
      } else {
        lastTap = now;
      }
    }, { passive: false });
  }
})();

async function play() {
  if (!visualObj) { setStatus("nothing to play", "err"); return; }
  if (!ABCJS.synth.supportsAudio()) {
    setStatus("audio unsupported in this browser", "err"); return;
  }
  try {
    if (synthControl) {
      try { synthControl.pause(); } catch (e) {}
      try { synthControl.destroy && synthControl.destroy(); } catch (e) {}
    }
    synthControl = new ABCJS.synth.SynthController();
    synthControl.load("#audio-host", null, {
      displayPlay: false, displayProgress: false, displayClock: false,
    });
    // SynthController loads soundfonts itself when given a soundFontUrl;
    // the previous code mixed in a separate CreateSynth which only
    // loaded the first couple of notes' buffers and the rest played silent.
    await synthControl.setTune(visualObj, false, {
      soundFontUrl: "https://paulrosen.github.io/midi-js-soundfonts/FluidR3_GM/",
      chordsOff: false,
    });
    synthControl.play();
    // Animate the stripchart playhead in step with audio playback (best-
    // effort: drives off performance.now() + ABC tempo rather than the
    // synth's own clock, so it can drift slightly on long tunes).
    if (viewMode === "stripchart") startStripchartPlayback();
    setStatus("playing", "ok");
  } catch (e) {
    setStatus("audio: " + (e && e.message || e), "err");
  }
}
function stop() {
  if (synthControl) { try { synthControl.pause(); } catch (e) {} }
  stopStripchartPlayback();
  setStatus("stopped");
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function renderMessage(msg) {
  const div = document.createElement("div");
  div.className = "msg " + msg.role;
  const role = document.createElement("span");
  role.className = "role";
  role.textContent = msg.role;
  div.appendChild(role);

  const body = document.createElement("div");
  // split by ```...``` fences
  const re = /```([a-zA-Z0-9_-]*)\n?([\s\S]*?)```/g;
  let last = 0, m;
  while ((m = re.exec(msg.content)) !== null) {
    if (m.index > last) {
      const txt = document.createElement("span");
      txt.textContent = msg.content.slice(last, m.index);
      body.appendChild(txt);
    }
    const lang = m[1] || "";
    const code = m[2];
    const pre = document.createElement("pre");
    pre.textContent = code;
    body.appendChild(pre);
    if (msg.role === "assistant" && (lang === "abc" || lang === "" || lang === "ABC")) {
      const btn = document.createElement("button");
      btn.className = "apply-btn";
      btn.textContent = "→ Apply to editor";
      btn.onclick = () => { cm.setValue(code); cm.focus(); };
      body.appendChild(btn);
    }
    last = m.index + m[0].length;
  }
  if (last < msg.content.length) {
    const txt = document.createElement("span");
    txt.textContent = msg.content.slice(last);
    body.appendChild(txt);
  }
  div.appendChild(body);
  return div;
}

function rerenderHistory() {
  chatHistory.innerHTML = "";
  for (const m of history) chatHistory.appendChild(renderMessage(m));
  chatHistory.scrollTop = chatHistory.scrollHeight;
}
rerenderHistory();

document.getElementById("btn-clear-chat").onclick = () => {
  if (!confirm("Clear chat history?")) return;
  history = []; saveHistory(history); rerenderHistory();
};

async function send() {
  const text = chatInput.value.trim();
  if (!text) return;
  const apiKey = lsGet(LS.key, "");
  if (!apiKey) {
    history.push({ role: "error",
      content: "No API key set. Click ⚙ in the toolbar to add one." });
    saveHistory(history); rerenderHistory();
    return;
  }
  const userMsg = { role: "user", content: text };
  history.push(userMsg);
  chatInput.value = "";
  saveHistory(history); rerenderHistory();

  // build request
  const sysPrompt = lsGet(LS.sys, DEFAULT_SYSTEM);
  const fullSystem = sysPrompt +
    "\n\n<current_abc>\n" + cm.getValue() + "\n</current_abc>";
  const apiHistory = history
    .filter(m => m.role === "user" || m.role === "assistant")
    .map(m => ({ role: m.role, content: m.content }));
  const body = {
    model: lsGet(LS.model, "claude-opus-4-7"),
    max_tokens: parseInt(lsGet(LS.maxtok, "4096"), 10) || 4096,
    system: fullSystem,
    messages: apiHistory,
  };

  setStatus("calling Claude...", "");
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "content-type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (!resp.ok) {
      throw new Error((data && data.error && data.error.message) ||
                       ("HTTP " + resp.status));
    }
    const text = (data.content || [])
      .filter(b => b.type === "text").map(b => b.text).join("\n").trim();
    history.push({ role: "assistant", content: text || "(empty)" });
    saveHistory(history); rerenderHistory();
    setStatus("ok", "ok");
  } catch (e) {
    history.push({ role: "error", content: String(e && e.message || e) });
    saveHistory(history); rerenderHistory();
    setStatus("api error", "err");
  }
}

document.getElementById("btn-send").onclick = send;

// 10.  PWA service worker (only on http(s) — not file:// or android_asset)
// ────────────────────────────────────────────────────────────────────
if ("serviceWorker" in navigator &&
    (location.protocol === "http:" || location.protocol === "https:")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((err) => {
      console.warn("sw register failed:", err);
    });
  });
}
</script>
